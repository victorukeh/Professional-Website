<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="lap-screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0d1f33;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="lap-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2997ff;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:0.5"/>
    </linearGradient>
    <filter id="lap-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Isometric laptop: screen -->
  <path
    d="M72 148 L228 88 L328 168 L172 228 Z"
    fill="url(#lap-screen)"
    stroke="url(#lap-accent)"
    stroke-width="1.25"
    opacity="0.95"
  />
  <!-- Code lines on screen -->
  <path d="M100 178 L200 138" stroke="#2997ff" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M100 192 L180 158" stroke="#2997ff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <path d="M100 206 L210 162" stroke="#a1a1a6" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M100 220 L165 188" stroke="#2997ff" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Hinge -->
  <path d="M172 228 L172 248 L328 188 L328 168" stroke="url(#lap-accent)" stroke-width="1" opacity="0.5"/>
  <!-- Base / keyboard deck -->
  <path
    d="M48 268 L172 228 L328 188 L204 248 Z"
    fill="#1c1c1e"
    stroke="rgba(41,151,255,0.25)"
    stroke-width="1"
  />
  <path
    d="M72 258 L196 218 L292 258 L168 298 Z"
    fill="#2c2c2e"
    stroke="rgba(255,255,255,0.06)"
    stroke-width="1"
  />
  <!-- Trackpad -->
  <path
    d="M148 278 L188 262 L212 272 L172 288 Z"
    fill="rgba(41,151,255,0.08)"
    stroke="rgba(41,151,255,0.2)"
    stroke-width="0.75"
  />
  <!-- Soft glow under device -->
  <ellipse cx="200" cy="360" rx="120" ry="28" fill="url(#lap-accent)" opacity="0.12" filter="url(#lap-glow)"/>
</svg>
